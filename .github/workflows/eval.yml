name: eval-gate

on:
  push:
    branches: [main]
  pull_request:

# Default-deny; jobs need no write scopes.
permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  eval:
    name: raggate gate
    runs-on: ubuntu-latest
    # Runs on trusted refs only: this job executes evals/target.py, so it must
    # not run PR-controlled code in a context that could hold OPENAI_API_KEY.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      # Install with the openai extra so the gate enforces when a key is present.
      - run: pip install -e ".[openai]"
      # With no OPENAI_API_KEY secret this runs in heuristic mode (informational).
      # Add the secret in repo settings to turn this into a hard quality gate.
      - run: raggate gate --json eval-results.json
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: eval-results
          path: eval-results.json
