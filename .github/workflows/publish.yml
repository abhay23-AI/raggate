name: publish

# Publishes to PyPI on a version tag using Trusted Publishing (OIDC) —
# no long-lived API token stored in secrets. Configure the publisher at
# https://pypi.org/manage/project/raggate/settings/publishing/ first.

on:
  push:
    # Full version tags only (v0.1.3). The moving `v1` Action tag must NOT
    # re-trigger a publish (the version is already on PyPI).
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

# Default-deny at the top; the publish job elevates only id-token: write below.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

